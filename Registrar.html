<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrar Camión</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div id="app">

  <div class="navbar">

    <div class="menu-toggle" id="menuToggle">☰</div>

    <div class="nav-links" id="navLinks">
      <a href="Registrar.html">Registrar</a>
      <a href="Registros.html">Registros</a>
    </div>

    <div class="user-section">
      <span id="userEmail"></span>
      <button id="logout">Salir</button>
    </div>

  </div>

  <div class="container">
    <form id="ingresoForm">
      <h2>Ingreso de Camión</h2>

      <input id="Patente" placeholder="Patente" required>
      <input id="NombreChofer" placeholder="Nombre" required>
      <input id="ApellidoPChofer" placeholder="Apellido Paterno" required>
      <input id="ApellidoMChofer" placeholder="Apellido Materno" required>

      <input type="date" id="FechaIngreso" required>
      <input type="time" id="HoraIngreso" required>

      <input id="Destino" placeholder="Destino" required>

      <button type="submit">Registrar</button>
    </form>
  </div>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
